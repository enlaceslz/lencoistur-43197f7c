server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Text assets: aggressive caching, but revalidate via ETag
    location ~* \.(?:css|js|mjs)$ {
        add_header Cache-Control "public, immutable, max-age=31536000";
        expires 1y;
        try_files $uri =404;
    }

    # Image/font assets: cache long, allow revalidate
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
        try_files $uri =404;
    }

    # Index.html: never cache (must check for new builds)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # SPA fallback: all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
