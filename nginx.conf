gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_min_length 256;
gzip_comp_level 5;
gzip_vary on;

brotli on;
brotli_comp_level 6;
brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/octet-stream;

map $sent_http_content_type $expires_map {
    default                                    off;
    ~*\.(css|js|mjs)$                          1y;
    ~*\.(png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot)$  1d;
}

server {
    listen 80;
    server_name www.lencois.tur.br;
    return 301 https://lencois.tur.br$request_uri;
}

server {
    listen 80;
    server_name lencois.tur.br;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Text assets: aggressive caching, immutable
    location ~* \.(?:css|js|mjs)$ {
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        expires 1y;
        try_files $uri =404;
    }

    # Image/font assets — fingerprints in filename and rarely change
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|eot)$ {
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        expires 1y;
        try_files $uri =404;
    }

    # Index.html: never cache (must check for new builds). Applied both to
    # the literal /index.html and to the SPA fallback below, otherwise a
    # cached old index.html keeps referencing lazy chunk hashes that a new
    # build has already deleted -> 404 on dynamic imports (e.g. /admin/login).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        expires 0;
    }

    # SPA fallback: first try prerendered HTML files,
    # then serve index.html as SPA entry point
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        expires 0;
        try_files $uri $uri/index.html $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
